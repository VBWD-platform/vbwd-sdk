name: Heavy Load

# Manual only — never on push/PR. See docs/dev_log/20260525/sprints/27-heavy-load.md
# for the design, scenarios and acceptance criteria.
on:
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Plugins to install + activate (comma-separated; "all" = full backend SDK)'
        default: 'all'
      backend_ref:
        description: 'vbwd-backend git ref to clone'
        default: 'main'
      users:
        description: 'Concurrent virtual users'
        default: '50'
      spawn_rate:
        description: 'Spawn rate (users/sec)'
        default: '5'
      duration:
        description: 'Run time (e.g. 2m, 5m, 30s)'
        default: '2m'
      scenarios:
        description: 'Scenario preset'
        default: 'all'
        type: choice
        options: [all, read-only, checkout-only, admin-only, token-pay-only]
      target_url:
        description: 'Override target URL (leave default to use the in-CI backend)'
        default: 'http://localhost:5000'
      fail_p95_ms:
        description: 'p95 latency budget (ms); breach fails the job'
        default: '1500'
      fail_pct_error:
        description: '% failed requests budget; breach fails the job'
        default: '1.0'

concurrency:
  group: heavy-load
  cancel-in-progress: false   # never auto-cancel a load run

jobs:
  load:
    name: Heavy load — ${{ inputs.scenarios }} · ${{ inputs.users }} VU · ${{ inputs.duration }} · plugins=${{ inputs.plugins }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vbwd
          POSTGRES_PASSWORD: vbwd
          POSTGRES_DB: vbwd
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vbwd"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    env:
      DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd
      REDIS_URL: redis://localhost:6379/0
      FLASK_ENV: production
      LOAD_ADMIN_EMAIL: admin@example.com
      LOAD_ADMIN_PASSWORD: AdminPass123@
      LOAD_TEST_PASSWORD: TestPass123@
      LOAD_FAIL_P95_MS: ${{ inputs.fail_p95_ms }}
      LOAD_FAIL_PCT_ERROR: ${{ inputs.fail_pct_error }}

    steps:
      # ── 1. Checkout the SDK (contains tests/load/locustfile.py + this workflow) ──
      - name: Checkout SDK
        uses: actions/checkout@v4

      # ── 2. Clone vbwd-backend at the chosen ref ──────────────────────────────
      - name: Clone vbwd-backend (ref=${{ inputs.backend_ref }})
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: ${{ inputs.backend_ref }}
          path: vbwd-backend

      # ── 3. Resolve plugin set + clone selected plugins ───────────────────────
      # "all" is the full backend SDK as of today: dev-install-ce.sh's set + the
      # post-script additions enabled on every instance (subscription, meinchat,
      # token-payment, checkout, booking) + regional payment plugins. Missing
      # repos are skipped (||) so a tightened list never breaks the matrix.
      - name: Clone selected plugins
        working-directory: vbwd-backend
        run: |
          set -e
          ALL_PLUGINS="analytics booking c2p2 chat checkout cms conekta email ghrm mailchimp meinchat mercado-pago paypal promptpay stripe subscription taro token-payment toss-payments truemoney yookassa"
          INPUT="${{ inputs.plugins }}"
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            PLUGINS="$ALL_PLUGINS"
          else
            PLUGINS=$(echo "$INPUT" | tr ',' ' ' | xargs)
          fi
          echo "Plugins to install: $PLUGINS"
          mkdir -p plugins
          for plugin in $PLUGINS; do
            DIR="plugins/${plugin//-/_}"  # plugin dirs use underscores (e.g. token_payment)
            REPO="https://github.com/VBWD-platform/vbwd-plugin-${plugin}.git"
            if git clone --depth=1 -q "$REPO" "$DIR" 2>/dev/null; then
              echo "  ✓ $plugin → $DIR"
            else
              # fall back to the dash-form dir if the repo's checkout uses it
              if git clone --depth=1 -q "$REPO" "plugins/$plugin" 2>/dev/null; then
                echo "  ✓ $plugin → plugins/$plugin"
              else
                echo "  ⚠ $plugin: repo not available, skipping"
              fi
            fi
          done

      # ── 4. Generate plugins.json enabling every cloned plugin ────────────────
      - name: Generate plugins.json (enable all installed)
        working-directory: vbwd-backend
        run: |
          python3 -c "
          import json, os
          plugins = {}
          for d in sorted(os.listdir('plugins')):
              if os.path.isfile(os.path.join('plugins', d, '__init__.py')):
                  plugins[d] = {'enabled': True, 'version': '1.0.0', 'source': 'local'}
          json.dump({'plugins': plugins}, open('plugins/plugins.json', 'w'), indent=2)
          print(f'plugins.json — {len(plugins)} active: {sorted(plugins)}')
          "

      # ── 5. Python + deps (backend's pinned set installs locust 2.17.0) ───────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt
      - name: Install Python dependencies
        working-directory: vbwd-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 6. Migrate the DB (full plugin graph, alembic upgrade heads) ─────────
      - name: alembic upgrade heads
        working-directory: vbwd-backend
        run: alembic upgrade heads

      # ── 7. Seed the catalog + test users (service layer, idempotent — no SQL) ─
      - name: Seed catalog + test users
        working-directory: vbwd-backend
        run: |
          python - <<'PY'
          from vbwd.app import create_app
          app = create_app()
          with app.app_context():
              try:
                  from vbwd.services.demo_data_registry import (
                      run_catalog_seeders, run_test_data_seeders,
                  )
              except ImportError:
                  # fall back to the lower-level register list if the helpers aren't there
                  from vbwd.services.demo_data_registry import _catalog_seeders, _test_data_seeders  # type: ignore
                  for fn in (_catalog_seeders or []):
                      fn()
                  for fn in (_test_data_seeders or []):
                      fn()
              else:
                  run_catalog_seeders()
                  run_test_data_seeders()
          print("seed: done")
          PY

      # ── 8. Boot the API (gunicorn, detached) ─────────────────────────────────
      - name: Start gunicorn (API)
        working-directory: vbwd-backend
        run: |
          gunicorn -w 4 -k gthread --threads 4 -b 0.0.0.0:5000 \
            --log-level warning --access-logfile - \
            "vbwd.app:create_app()" > ../gunicorn.log 2>&1 &
          echo $! > ../gunicorn.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/v1/health > /dev/null && { echo "API healthy after ${i}s"; exit 0; }
            sleep 2
          done
          echo "API failed to start — gunicorn log:"
          cat ../gunicorn.log
          exit 1

      # ── 9. Run Locust (headless, with the configured thresholds) ─────────────
      - name: Run Locust
        run: |
          mkdir -p load-report
          case "${{ inputs.scenarios }}" in
            read-only)      CLASSES="AnonymousBrowse AuthedDashboard" ;;
            checkout-only)  CLASSES="CheckoutFlow" ;;
            admin-only)     CLASSES="AdminQueries" ;;
            token-pay-only) CLASSES="TokenBalancePay" ;;
            *)              CLASSES="" ;;
          esac
          locust -f tests/load/locustfile.py \
            --host "${{ inputs.target_url }}" \
            --headless \
            --users "${{ inputs.users }}" \
            --spawn-rate "${{ inputs.spawn_rate }}" \
            --run-time "${{ inputs.duration }}" \
            --csv load-report/stats \
            --html load-report/index.html \
            --exit-code-on-error 1 \
            ${CLASSES}

      # ── 10. Aggregated summary (always, even on threshold breach) ────────────
      - name: Print summary
        if: always()
        run: |
          echo "::group::Aggregated stats (stats_stats.csv)"
          [ -f load-report/stats_stats.csv ] && cat load-report/stats_stats.csv || echo "(missing)"
          echo "::endgroup::"

      - name: Upload HTML report + CSVs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-load-report-${{ github.run_number }}
          path: |
            load-report/
            gunicorn.log

      - name: Stop gunicorn
        if: always()
        run: |
          [ -f gunicorn.pid ] && kill "$(cat gunicorn.pid)" 2>/dev/null || true
